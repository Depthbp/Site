<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AquaChat</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(180deg,#0b1a2a,#050d18);
  color:white;
}

/* 상단 바 */
#top {
  padding:15px;
  background:#081424;
  font-size:20px;
  font-weight:bold;
}

/* 채팅 영역 */
#chat {
  height:70vh;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* 메시지 */
.msg {
  max-width:60%;
  margin:5px;
  padding:10px;
  border-radius:15px;
  word-break:break-word;
}

/* 내가 보낸 메시지 */
.me {
  background:#00bcd4;
  align-self:flex-end;
  color:black;
}

/* 남 메시지 */
.other {
  background:#1e2f4a;
  align-self:flex-start;
}

/* 입력창 */
#inputBox {
  display:flex;
  padding:10px;
  background:#081424;
}

#msg {
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  outline:none;
}

button {
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00bcd4;
  color:black;
  cursor:pointer;
}

/* 로그인한 계정 이름(상단바) */
#whoami { font-size:13px; font-weight:normal; opacity:.75; }

/* 메시지 내부: 이름 / 본문 / 시간 */
.msg-name { font-size:12px; font-weight:bold; margin-bottom:3px; opacity:.85; }
.msg-body { word-break:break-word; white-space:pre-wrap; }
.msg-time { font-size:10px; opacity:.55; margin-top:4px; text-align:right; }
</style>

</head>

<body>

<div id="top">🌊 AquaChat <span id="whoami"></span></div>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="메시지 입력">
  <button onclick="send()">전송</button>
  <button id="loginBtn" onclick="login()">로그인</button>
  <button id="logoutBtn" onclick="logout()" style="display:none">로그아웃</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCD955-J7exMoOtVkjhgm_nG8fCm1sO-eE",
  authDomain: "aquachat-92b63.firebaseapp.com",
  projectId: "aquachat-92b63",
  storageBucket: "aquachat-92b63.firebasestorage.app",
  messagingSenderId: "399374422935",
  appId: "1:399374422935:web:c6bda44eb5fa86a796ead2",
  measurementId: "G-CYE7B97XN2"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

const provider = new GoogleAuthProvider();

window.login = function(){
  signInWithPopup(auth, provider);
}

window.logout = function(){
    signOut(auth);
}

// 로그인 상태에 따라 버튼 토글 + 상단바에 표시 이름(구글 displayName) 노출
onAuthStateChanged(auth, (user)=>{
  const li = document.getElementById("loginBtn");
  const lo = document.getElementById("logoutBtn");
  const who = document.getElementById("whoami");
  if(li) li.style.display = user ? "none" : "";
  if(lo) lo.style.display = user ? "" : "none";
  if(who) who.innerHTML = user ? ("— " + (user.displayName || "익명") + " 님") : "";
});

// 메시지 전송
window.send = async function(){

  const user = auth.currentUser;
  if(!user) return alert("로그인 먼저!");

  const text = document.getElementById("msg").value;
  if(!text) return;

  await addDoc(collection(db,"messages"),{
    name: user.displayName,
    uid: user.uid,
    text: text,
    time: serverTimestamp()
  });

  document.getElementById("msg").value="";
}

// 채팅 출력
const q = query(collection(db,"messages"), orderBy("time"));

onSnapshot(q,(snapshot)=>{

  const chat = document.getElementById("chat");
  chat.innerHTML="";

  snapshot.forEach((docSnap)=>{
  const m = docSnap.data();
  const mine = auth.currentUser && m.uid === auth.currentUser.uid;

  const div = document.createElement("div");
  div.className = "msg" + (mine ? " me" : " other");

  div.innerHTML = `
    <div class="msg-name">${(m.name ?? "익명") + (mine ? " (나)" : "")}</div>
    <div class="msg-body">${m.text ?? ""}</div>
    <div class="msg-time">${fmtTime(m.time)}</div>
  `;

  chat.appendChild(div);
  });

  // 자동 스크롤
  chat.scrollTop = chat.scrollHeight;

});

// Firestore serverTimestamp → "월/일 시:분". 전송 직후 서버확정 전엔 null → "…"
function fmtTime(ts){
  try{
    const d = ts && typeof ts.toDate === "function" ? ts.toDate() : null;
    if(!d) return "…";
    return d.toLocaleString([], {month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit"});
  }catch(e){ return ""; }
}

</script>

</body>
</html>
