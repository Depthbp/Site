    <!-- 내비게이션 바가 삽입될 위치 -->

        <div class="container">
            <h2 class="mb-4">동아리 소개</h2>
            <blockquote class="blockquote">
                <p class="lead mb-0 display-6 fst-italic">
                    <span class="fw-bold" style="font-size:2.5rem;">&ldquo;</span>
                    깊이 있는 코드, 깊이 있는 코딩!
                    <span class="fw-bold" style="font-size:2.5rem;">&rdquo;</span>
                </p>
            </blockquote>

                사고력을 기른다.</p>
